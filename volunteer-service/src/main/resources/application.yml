server:
  port: 8083

spring:
  application:
    name: volunteer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/volunteer_db
    username: postgres
    password: Vijayalakshmi
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
